<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Header</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    .site-header {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100; pointer-events: auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem;
      height: 72px;
      background: rgba(2, 7, 24, 0.35);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .site-logo {
      color: white;
      font-family: "Syne", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      opacity: 0.9;
      transition: opacity 0.3s ease;
    }
    .site-logo:hover { opacity: 1; }

    .nav-links {
      display: flex; gap: 0.25rem; align-items: center;
    }

    .nav-link {
      height: 38px; padding: 0 1.1rem;
      background: transparent;
      border: none;
      border-radius: 8px; color: rgba(255, 255, 255, 0.7);
      font-family: "Syne", sans-serif; font-size: 0.78rem;
      font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
      text-decoration: none;
      transition: all 0.25s ease;
      display: flex; align-items: center; justify-content: center;
      white-space: nowrap;
    }
    .nav-link:hover {
      color: white;
      background: rgba(255, 255, 255, 0.1);
    }
    .nav-link.active {
      color: white;
      background: rgba(255, 255, 255, 0.12);
    }

    .nav-cta {
      height: 38px; padding: 0 1.25rem;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 20px; color: white;
      font-family: "Syne", sans-serif; font-size: 0.78rem;
      font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      text-decoration: none;
      transition: all 0.25s ease;
      display: flex; align-items: center; justify-content: center;
      margin-left: 0.75rem;
    }
    .nav-cta:hover {
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a class="site-logo" href="/">Hugo Ortiz</a>
    <nav class="nav-links">
      <a class="nav-link active" href="/inicio">Inicio</a>
      <a class="nav-link" href="/nosotros">Nosotros</a>
      <a class="nav-link" href="/proyectos">Proyectos</a>
      <a class="nav-cta" href="/contacto">Contacto</a>
    </nav>
  </header>

  <script>
    // Marca automáticamente el enlace activo según la URL actual
    const links = document.querySelectorAll(".nav-link");
    links.forEach(link => {
      if (link.href === window.location.href) {
        links.forEach(l => l.classList.remove("active"));
        link.classList.add("active");
      }
    });
  </script>

</body>
</html>
