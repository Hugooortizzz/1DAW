<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <style>
        * {
            margin: 0;
        }

        @font-face {
            font-family: OnePiece;
            src: url(resources/one\ piece\ font.ttf);
        }

        h1 {
            text-align: center;
            font-family: "OnePiece";
            font-size: 60px;
        }

        #centro{
            width: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #mostrar {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            width: 50%;
            background-color: white;
        }

        #menu{
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: 40px;
        }

        #menu div {
            margin: 10px 0;
        }

        #layout {
            display: flex;
            flex-direction: row;
            justify-content: center;
            width: 100%;
        }

        aside {
            height: 100vh;
            width: 100px;
            width: 25%;
        }

        #izquierda {
            background-image: url("resources/asideiz.png");
        }

        #derecha {
            background-image: url("resources/asideder.png");
        }

        button {
            margin: 10px;
            border-radius: 2px;
        }

        .finales {
            width: 80px;
            height: 50px;
        }

        .finales:hover {
            transform: scale(1.25);
        }

        .finales:active {
            transform: scale(0.95);
        }

        #imagen{
            width: 300px;
            height: 400px;
            border: 1px solid black;
        }

    </style>
</head>

<body>
    <div id="layout">
        <aside id="izquierda">
        </aside>
        <div id="centro">
            <h1>Nuevo Personaje</h1>
            <div id="mostrar">
            
            <div id="imagen">
                <img id="imagen" src="https://imgs.search.brave.com/XtJK0itkXwynQ-cJdo14VYm_cLaHC7nT796fBajKpu4/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pbWFn/ZXMudW5zcGxhc2gu/Y29tL3Bob3RvLTE3/NzU1MzQ3NzgzNzUt/M2YyMzVjNDY2YzU4/P2ZtPWpwZyZxPTYw/Jnc9MzAwMCZhdXRv/PWZvcm1hdCZmaXQ9/Y3JvcCZpeGxpYj1y/Yi00LjEuMCZpeGlk/PU0zd3hNakEzZkRC/OE1IeHpaV0Z5WTJo/OE1qQjhmSEJzWVds/dUpUSXdkMmhwZEdW/OFpXNThNSHg4TUh4/OGZEQT0">
            </div>
            <div id="menu">
                
                <div>
                    Nombre: <input type="text" id="nombre">
                </div>
                <div>
                    Estilo de combate:<br>
                    <input type="checkbox" id="artesMarciales" name="combate" value="artesMarciales"> Artes Marciales<br>
                    <input type="checkbox" id="armas" name="combate" value="armas"> Armas<br>
                    <input type="checkbox" id="fruta" name="combate" value="fruta"> Fruta del Diablo
                </div>
                <div>
                    Escala de poder: <input type="number" id="poder" min="0" max="100">
                </div>
                <div>
                    Imagen: <input type="text" id="nombre">
                </div>
                <div>
                    <button class="finales" id="volver">Volver</button>
                    <button class="finales" id="enviar">Enviar</button>
                </div>
            </div>
        </div>
        </div>
        

        <aside id="derecha">
        </aside>
    </div>


</body>

</html>
