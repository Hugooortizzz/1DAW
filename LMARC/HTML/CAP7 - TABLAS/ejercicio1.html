<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        table {
            border: solid;
            border-width: 1px;
            border-color: black;
            border-collapse: collapse;
        }

        table td, th {
            border: solid;
            border-width: 1px;
            border-color: black;
            padding-inline: 20px;
        }
    </style>
</head>
<body>
    <h1>Fusión de Filas y Columnas</h1>

    <table>
        <tr>
            <td>A</td>
            <td>B</td>
            <td rowspan="3">C</td>
            <td>D</td>
        </tr>

        <tr>
            <td rowspan="2">E</td>
            <td>F</td>
            <td rowspan="3">G</td>
        </tr>

        <tr>
            <td>H</td>
        </tr>

        <tr>
            <td>I</td>
            <td>J</td>
            <td>K</td>
        </tr>
    </table>
</body>
</html>
