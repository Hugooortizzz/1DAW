<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generación de Música</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: sans-serif; cursor: none; }
    #webGLApp { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

    /* ── Slot donde se inyecta el header ── */
    #header-slot {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
    }

    .heading {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10; color: white; text-align: center;
      white-space: nowrap; pointer-events: none;
      font-family: "Syne", sans-serif;
      font-size: clamp(3.5rem, 9vw, 9rem);
      font-weight: 700; letter-spacing: -0.02em; line-height: 1;
    }

    .footer {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%); z-index: 10;
      color: white; font-family: "Syne", sans-serif;
      font-size: clamp(0.875rem, 1.5vw, 1.125rem);
      font-weight: 500; letter-spacing: 0.05em;
      text-transform: uppercase; text-align: center; pointer-events: auto;
    }
    .footer a { color: white; text-decoration: none; transition: opacity 0.3s ease; }
    .footer a:hover { opacity: 0.7; }

    .custom-cursor {
      position: fixed; width: 40px; height: 40px;
      border: 2px solid white; border-radius: 50%;
      pointer-events: none; z-index: 1000;
      transform: translate(-50%, -50%); background: transparent;
      will-change: transform;
    }
    .custom-cursor::before {
      content: ""; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 8px; background: white; border-radius: 50%;
    }
  </style>
</head>
<body>

  <!-- Header inyectado desde header.html -->
  <div id="header-slot"></div>

  <h1 class="heading">Generación de Música</h1>

  <footer class="footer">
    <a href="#">Hugo Ortiz Durán</a>
  </footer>

  <div class="custom-cursor" id="customCursor"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>

    // ─── Carga del header externo ─────────────────────────────────────────────────
    fetch("header.html")
      .then(res => res.text())
      .then(html => {
        // Extraemos solo el <header> del HTML recibido
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");

        // Insertamos el <header> y su <style>
        const headerEl = doc.querySelector("header");
        const styleEl  = doc.querySelector("style");
        const scriptEl = doc.querySelector("script");

        if (styleEl) {
          const clonedStyle = document.createElement("style");
          clonedStyle.textContent = styleEl.textContent;
          document.head.appendChild(clonedStyle);
        }
        if (headerEl) {
          document.getElementById("header-slot").appendChild(headerEl);
        }
        if (scriptEl) {
          const clonedScript = document.createElement("script");
          clonedScript.textContent = scriptEl.textContent;
          document.body.appendChild(clonedScript);
        }
      })
      .catch(() => {
        // Fallback: si no se puede cargar (ej. abrir sin servidor),
        // se muestra el header inline como respaldo
        document.getElementById("header-slot").innerHTML = `
          <header style="
            position:fixed;top:0;left:0;right:0;z-index:100;
            display:flex;align-items:center;justify-content:space-between;
            padding:0 2.5rem;height:72px;
            background:rgba(2,7,24,0.35);backdrop-filter:blur(18px);
            border-bottom:1px solid rgba(255,255,255,0.08);
            font-family:'Syne',sans-serif;
          ">
            <a href="/" style="color:white;font-size:1rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;">Hugo Ortiz</a>
            <nav style="display:flex;gap:0.25rem;align-items:center;">
              <a href="/inicio"    style="height:38px;padding:0 1.1rem;color:rgba(255,255,255,0.7);font-size:0.78rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;display:flex;align-items:center;">Inicio</a>
              <a href="/nosotros"  style="height:38px;padding:0 1.1rem;color:rgba(255,255,255,0.7);font-size:0.78rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;display:flex;align-items:center;">Nosotros</a>
              <a href="/proyectos" style="height:38px;padding:0 1.1rem;color:rgba(255,255,255,0.7);font-size:0.78rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;display:flex;align-items:center;">Proyectos</a>
              <a href="/contacto"  style="height:38px;padding:0 1.25rem;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);border-radius:20px;color:white;font-size:0.78rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;display:flex;align-items:center;margin-left:0.75rem;">Contacto</a>
            </nav>
          </header>`;
      });

    // ─── TouchTexture ────────────────────────────────────────────────────────────
    class TouchTexture {
      constructor() {
        this.size = 64;
        this.width = this.height = this.size;
        this.maxAge = 64;
        this.radius = 0.25 * this.size;
        this.speed = 1 / this.maxAge;
        this.trail = [];
        this.last = null;
        this.initTexture();
      }
      initTexture() {
        this.canvas = document.createElement("canvas");
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        this.ctx = this.canvas.getContext("2d");
        this.ctx.fillStyle = "black";
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        this.texture = new THREE.Texture(this.canvas);
      }
      update() {
        this.clear();
        for (let i = this.trail.length - 1; i >= 0; i--) {
          const point = this.trail[i];
          let f = point.force * this.speed * (1 - point.age / this.maxAge);
          point.x += point.vx * f;
          point.y += point.vy * f;
          point.age++;
          if (point.age > this.maxAge) this.trail.splice(i, 1);
          else this.drawPoint(point);
        }
        this.texture.needsUpdate = true;
      }
      clear() {
        this.ctx.fillStyle = "black";
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
      }
      addTouch(point) {
        let force = 0, vx = 0, vy = 0;
        const last = this.last;
        if (last) {
          const dx = point.x - last.x, dy = point.y - last.y;
          if (dx === 0 && dy === 0) return;
          const dd = dx * dx + dy * dy;
          const d = Math.sqrt(dd);
          vx = dx / d; vy = dy / d;
          force = Math.min(dd * 20000, 2.0);
        }
        this.last = { x: point.x, y: point.y };
        this.trail.push({ x: point.x, y: point.y, age: 0, force, vx, vy });
      }
      drawPoint(point) {
        const pos = { x: point.x * this.width, y: (1 - point.y) * this.height };
        let intensity = 1;
        if (point.age < this.maxAge * 0.3) {
          intensity = Math.sin((point.age / (this.maxAge * 0.3)) * (Math.PI / 2));
        } else {
          const t = 1 - (point.age - this.maxAge * 0.3) / (this.maxAge * 0.7);
          intensity = -t * (t - 2);
        }
        intensity *= point.force;
        const radius = this.radius;
        const color = `${((point.vx + 1) / 2) * 255}, ${((point.vy + 1) / 2) * 255}, ${intensity * 255}`;
        const offset = this.size * 5;
        this.ctx.shadowOffsetX = offset;
        this.ctx.shadowOffsetY = offset;
        this.ctx.shadowBlur = radius;
        this.ctx.shadowColor = `rgba(${color},${0.2 * intensity})`;
        this.ctx.beginPath();
        this.ctx.fillStyle = "rgba(255,0,0,1)";
        this.ctx.arc(pos.x - offset, pos.y - offset, radius, 0, Math.PI * 2);
        this.ctx.fill();
      }
    }

    // ─── GradientBackground ──────────────────────────────────────────────────────
    class GradientBackground {
      constructor(sceneManager) {
        this.sceneManager = sceneManager;
        this.mesh = null;
        this.uniforms = {
          uTime:           { value: 0 },
          uResolution:     { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
          uColor1:         { value: new THREE.Vector3(0.071, 0.251, 0.698) },  // #1240B2 royal blue
          uColor2:         { value: new THREE.Vector3(0.012, 0.063, 0.200) },  // #031033 deep navy
          uColor3:         { value: new THREE.Vector3(0.200, 0.451, 0.851) },  // #3373D9 medium blue
          uColor4:         { value: new THREE.Vector3(0.004, 0.031, 0.122) },  // #010820 midnight
          uColor5:         { value: new THREE.Vector3(0.357, 0.608, 0.925) },  // #5B9BEC sky blue
          uColor6:         { value: new THREE.Vector3(0.024, 0.102, 0.310) },  // #061A4F dark blue
          uSpeed:          { value: 1.5 },
          uIntensity:      { value: 1.8 },
          uTouchTexture:   { value: null },
          uGrainIntensity: { value: 0.06 },
          uDarkNavy:       { value: new THREE.Vector3(0.008, 0.027, 0.102) },  // #020718
          uGradientSize:   { value: 0.45 },
          uGradientCount:  { value: 12.0 },
          uColor1Weight:   { value: 0.7 },
          uColor2Weight:   { value: 1.6 }
        };
      }
      init() {
        const viewSize = this.sceneManager.getViewSize();
        const geometry = new THREE.PlaneGeometry(viewSize.width, viewSize.height, 1, 1);
        const material = new THREE.ShaderMaterial({
          uniforms: this.uniforms,
          vertexShader: `
            varying vec2 vUv;
            void main() {
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position.xyz, 1.);
              vUv = uv;
            }
          `,
          fragmentShader: `
            uniform float uTime;
            uniform vec2 uResolution;
            uniform vec3 uColor1, uColor2, uColor3, uColor4, uColor5, uColor6;
            uniform float uSpeed, uIntensity;
            uniform sampler2D uTouchTexture;
            uniform float uGrainIntensity;
            uniform vec3 uDarkNavy;
            uniform float uGradientSize, uGradientCount, uColor1Weight, uColor2Weight;
            varying vec2 vUv;

            float grain(vec2 uv, float t) {
              vec2 g = uv * uResolution * 0.5;
              return fract(sin(dot(g + t, vec2(12.9898, 78.233))) * 43758.5453) * 2.0 - 1.0;
            }

            vec3 getGradientColor(vec2 uv, float time) {
              float gr = uGradientSize;
              vec2 c1  = vec2(0.5 + sin(time*uSpeed*0.40)*0.40, 0.5 + cos(time*uSpeed*0.50)*0.40);
              vec2 c2  = vec2(0.5 + cos(time*uSpeed*0.60)*0.50, 0.5 + sin(time*uSpeed*0.45)*0.50);
              vec2 c3  = vec2(0.5 + sin(time*uSpeed*0.35)*0.45, 0.5 + cos(time*uSpeed*0.55)*0.45);
              vec2 c4  = vec2(0.5 + cos(time*uSpeed*0.50)*0.40, 0.5 + sin(time*uSpeed*0.40)*0.40);
              vec2 c5  = vec2(0.5 + sin(time*uSpeed*0.70)*0.35, 0.5 + cos(time*uSpeed*0.60)*0.35);
              vec2 c6  = vec2(0.5 + cos(time*uSpeed*0.45)*0.50, 0.5 + sin(time*uSpeed*0.65)*0.50);
              vec2 c7  = vec2(0.5 + sin(time*uSpeed*0.55)*0.38, 0.5 + cos(time*uSpeed*0.48)*0.42);
              vec2 c8  = vec2(0.5 + cos(time*uSpeed*0.65)*0.36, 0.5 + sin(time*uSpeed*0.52)*0.44);
              vec2 c9  = vec2(0.5 + sin(time*uSpeed*0.42)*0.41, 0.5 + cos(time*uSpeed*0.58)*0.39);
              vec2 c10 = vec2(0.5 + cos(time*uSpeed*0.48)*0.37, 0.5 + sin(time*uSpeed*0.62)*0.43);
              float i1  = 1. - smoothstep(0., gr, length(uv - c1));
              float i2  = 1. - smoothstep(0., gr, length(uv - c2));
              float i3  = 1. - smoothstep(0., gr, length(uv - c3));
              float i4  = 1. - smoothstep(0., gr, length(uv - c4));
              float i5  = 1. - smoothstep(0., gr, length(uv - c5));
              float i6  = 1. - smoothstep(0., gr, length(uv - c6));
              float i7  = 1. - smoothstep(0., gr, length(uv - c7));
              float i8  = 1. - smoothstep(0., gr, length(uv - c8));
              float i9  = 1. - smoothstep(0., gr, length(uv - c9));
              float i10 = 1. - smoothstep(0., gr, length(uv - c10));
              vec2 ruv1 = uv - 0.5;
              float a1  = time * uSpeed * 0.15;
              ruv1 = vec2(ruv1.x*cos(a1) - ruv1.y*sin(a1), ruv1.x*sin(a1) + ruv1.y*cos(a1)) + 0.5;
              vec2 ruv2 = uv - 0.5;
              float a2  = -time * uSpeed * 0.12;
              ruv2 = vec2(ruv2.x*cos(a2) - ruv2.y*sin(a2), ruv2.x*sin(a2) + ruv2.y*cos(a2)) + 0.5;
              float ri1 = 1. - smoothstep(0., 0.8, length(ruv1 - 0.5));
              float ri2 = 1. - smoothstep(0., 0.8, length(ruv2 - 0.5));
              vec3 color = vec3(0.);
              color += uColor1 * i1  * (0.55 + 0.45*sin(time*uSpeed      )) * uColor1Weight;
              color += uColor2 * i2  * (0.55 + 0.45*cos(time*uSpeed*1.20 )) * uColor2Weight;
              color += uColor3 * i3  * (0.55 + 0.45*sin(time*uSpeed*0.80 )) * uColor1Weight;
              color += uColor4 * i4  * (0.55 + 0.45*cos(time*uSpeed*1.30 )) * uColor2Weight;
              color += uColor5 * i5  * (0.55 + 0.45*sin(time*uSpeed*1.10 )) * uColor1Weight;
              color += uColor6 * i6  * (0.55 + 0.45*cos(time*uSpeed*0.90 )) * uColor2Weight;
              if (uGradientCount > 6.) {
                color += uColor1 * i7  * (0.55 + 0.45*sin(time*uSpeed*1.40)) * uColor1Weight;
                color += uColor2 * i8  * (0.55 + 0.45*cos(time*uSpeed*1.50)) * uColor2Weight;
                color += uColor3 * i9  * (0.55 + 0.45*sin(time*uSpeed*1.60)) * uColor1Weight;
                color += uColor4 * i10 * (0.55 + 0.45*cos(time*uSpeed*1.70)) * uColor2Weight;
              }
              color += mix(uColor1, uColor3, ri1) * 0.45 * uColor1Weight;
              color += mix(uColor2, uColor4, ri2) * 0.40 * uColor2Weight;
              color = clamp(color, vec3(0.), vec3(1.)) * uIntensity;
              float lum = dot(color, vec3(0.299, 0.587, 0.114));
              color = mix(vec3(lum), color, 1.35);
              color = pow(color, vec3(0.92));
              float b1  = length(color);
              float mf1 = max(b1 * 1.2, 0.15);
              color = mix(uDarkNavy, color, mf1);
              float br = length(color);
              if (br > 1.0) color *= 1.0 / br;
              return color;
            }

            void main() {
              vec2 uv = vUv;
              vec4 tt = texture2D(uTouchTexture, uv);
              float vx = -(tt.r * 2.0 - 1.0);
              float vy = -(tt.g * 2.0 - 1.0);
              float intensity = tt.b;
              uv.x += vx * 0.8 * intensity;
              uv.y += vy * 0.8 * intensity;
              float dist   = length(uv - vec2(0.5));
              float ripple = sin(dist * 20.0 - uTime * 3.0) * 0.04 * intensity;
              float wave   = sin(dist * 15.0 - uTime * 2.0) * 0.03 * intensity;
              uv += vec2(ripple + wave);
              vec3 color = getGradientColor(uv, uTime);
              color += grain(uv, uTime) * uGrainIntensity;
              float ts = uTime * 0.5;
              color.r += sin(ts       ) * 0.010;
              color.g += cos(ts * 1.40) * 0.010;
              color.b += sin(ts * 1.20) * 0.020;
              float b2  = length(color);
              float mf2 = max(b2 * 1.2, 0.15);
              color = mix(uDarkNavy, color, mf2);
              color = clamp(color, vec3(0.), vec3(1.));
              float br = length(color);
              if (br > 1.0) color *= 1.0 / br;
              gl_FragColor = vec4(color, 1.0);
            }
          `
        });
        this.mesh = new THREE.Mesh(geometry, material);
        this.mesh.position.z = 0;
        this.sceneManager.scene.add(this.mesh);
      }
      update(delta) {
        if (this.uniforms.uTime) this.uniforms.uTime.value += delta;
      }
      onResize(w, h) {
        const viewSize = this.sceneManager.getViewSize();
        if (this.mesh) {
          this.mesh.geometry.dispose();
          this.mesh.geometry = new THREE.PlaneGeometry(viewSize.width, viewSize.height, 1, 1);
        }
        if (this.uniforms.uResolution) this.uniforms.uResolution.value.set(w, h);
      }
    }

    // ─── App ─────────────────────────────────────────────────────────────────────
    class App {
      constructor() {
        this.renderer = new THREE.WebGLRenderer({
          antialias: true,
          powerPreference: "high-performance",
          alpha: false, stencil: false, depth: false
        });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(this.renderer.domElement);
        this.renderer.domElement.id = "webGLApp";
        this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
        this.camera.position.z = 50;
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x020718);
        this.clock = new THREE.Clock();
        this.touchTexture = new TouchTexture();
        this.gradientBackground = new GradientBackground(this);
        this.gradientBackground.uniforms.uTouchTexture.value = this.touchTexture.texture;
        this.init();
      }
      init() {
        this.gradientBackground.init();
        this.render();
        this.tick();
        window.addEventListener("resize",    () => this.onResize());
        window.addEventListener("mousemove", (ev) => this.onMouseMove(ev));
        window.addEventListener("touchmove", (ev) => this.onTouchMove(ev));
      }
      onTouchMove(ev) {
        const t = ev.touches[0];
        this.onMouseMove({ clientX: t.clientX, clientY: t.clientY });
      }
      onMouseMove(ev) {
        this.mouse = { x: ev.clientX / window.innerWidth, y: 1 - ev.clientY / window.innerHeight };
        this.touchTexture.addTouch(this.mouse);
      }
      getViewSize() {
        const fov = (this.camera.fov * Math.PI) / 180;
        const height = Math.abs(this.camera.position.z * Math.tan(fov / 2) * 2);
        return { width: height * this.camera.aspect, height };
      }
      update(delta) {
        this.touchTexture.update();
        this.gradientBackground.update(delta);
      }
      render() {
        const delta = this.clock.getDelta();
        this.renderer.render(this.scene, this.camera);
        this.update(Math.min(delta, 0.1));
      }
      tick() {
        this.render();
        requestAnimationFrame(() => this.tick());
      }
      onResize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.gradientBackground.onResize(window.innerWidth, window.innerHeight);
      }
    }

    // ─── Arranque ────────────────────────────────────────────────────────────────
    const app = new App();

    // ─── Cursor personalizado ────────────────────────────────────────────────────
    const cursor = document.getElementById("customCursor");
    let mouseX = 0, mouseY = 0, isCursorAnimating = false;

    document.addEventListener("mousemove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      if (!isCursorAnimating) {
        isCursorAnimating = true;
        animateCursor();
      }
    });

    function animateCursor() {
      cursor.style.left = mouseX + "px";
      cursor.style.top  = mouseY + "px";
      requestAnimationFrame(animateCursor);
    }

    document.querySelectorAll(".footer a").forEach(el => {
      el.addEventListener("mouseenter", () => {
        cursor.style.width = "50px"; cursor.style.height = "50px"; cursor.style.borderWidth = "3px";
      });
      el.addEventListener("mouseleave", () => {
        cursor.style.width = "40px"; cursor.style.height = "40px"; cursor.style.borderWidth = "2px";
      });
    });

  </script>
</body>
</html>
