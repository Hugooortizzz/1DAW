
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Ejercicio 3 - DOM basico y atributos XHTML</title>
<script type="text/javascript">
function mas() {
    let texto = ["texto1", "texto2", "texto3", "texto4", "texto5", "texto6"];

    let lista = document.getElementById("lista");
    let linea = document.createElement("li");
    let contenido = document.createTextNode(texto[Math.floor(Math.random() * 6)]);
    linea.appendChild(contenido);
    lista.appendChild(linea);
}
</script>
</head>
<body>
<ul id="lista">
<li>Lorem ipsum dolor sit amet</li>
<li>Consectetuer adipiscing elit</li>
<li>Sed mattis enim vitae orci</li> 
<li>Phasellus libero</li>
<li>Maecenas nisl arcu</li>
</ul>
<input type="button" value="Sumar elemento" onclick="mas();">
</body>
</html>
