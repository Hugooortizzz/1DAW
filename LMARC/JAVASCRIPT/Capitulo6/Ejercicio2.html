<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Ejercicio 2 - Eventos</title>

<style type="text/css">
    body {font-family: arial, helvetica;}
    #info {width:160px; border:thin solid silver; padding:.5em; position:fixed;}
    #info h1 {margin: 0;}
</style>

<script type="text/javascript">

    function informacion(elEvento) {
        var evento = elEvento || window.event;

        // Debes obtener las coordenadas del clic del ratón
        var x = evento.clientX;
        var y = evento.clientY;

        // Debes obtener el tamaño de la ventana: variable ancho y variable alto
        var tamano = tamanoVentanaNavegador();
       

        var zonaHorizontal, zonaVertical;

        // Determina izquierda o derecha
       if (x < (tamano[0] / 2)){
        zonaHorizontal = "izquierda";
       }else{
        zonaHorizontal = "derecha";
       }

        // Determina arriba o abajo
       if (y < (tamano[1] / 2)){
        zonaVertical = "arriba";
       }else{
        zonaVertical = "abajo";
       }


        

        var mensaje = ["Has pulsado en:",zonaHorizontal + " " + zonaVertical];

        muestraInformacion(mensaje);
    }

    function muestraInformacion(mensaje) {
        document.getElementById("info").innerHTML = '<h1>' + mensaje[0] + '</h1>';
        for(var i = 1; i < mensaje.length; i++) {
            document.getElementById("info").innerHTML += '<p>' + mensaje[i] + '</p>';
        }
    }

    function tamanoVentanaNavegador(){
        var dimensiones = [];
          return dimensiones = [window.innerWidth, window.innerHeight];
    }

    document.onclick = informacion;

</script>
</head>

<body>
    <div id="info"></div>

    <br /><br /><br /><br /><br /><br /><br /><br /><br /><br />
    <br /><br /><br /><br /><br /><br /><br /><br /><br /><br />
    <br /><br /><br /><br /><br /><br /><br /><br /><br /><br />
</body>
</html>
