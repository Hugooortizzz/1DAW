<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script type="text/javascript">
        function limitar(maximoCaracteres, event) {
            var elemento = document.getElementById("texto");
            let progreso = document.getElementById("progreso");
            let caracteres = (maximoCaracteres - elemento.value.length) -1
            let porcentaje = 100/maximoCaracteres;
            let porcentajeSumar = parseInt(progreso.style.width.replace('%','')) + porcentaje;
            let porcentajeRestar = parseInt(progreso.style.width.replace('%','')) - porcentaje;

            if(parseInt(progreso.style.width.replace('%','')) >= 100-porcentaje){
                progreso.style.backgroundColor = "red";
            }else{
                progreso.style.backgroundColor = "green";                
            }

            if (event.key == "Backspace" || event.key == "Delete" || event.keyCode == 37 || event.keyCode == 38 || event.keyCode == 39 || event.keyCode == 40 || event.key == "Alt" || event.key =="AltGraph" || event.key == "Shift" || event.key == "Control") {
                if ((event.key == "Backspace" || event.key == "Delete") && (caracteres +2) <= maximoCaracteres){
                    progreso.style.backgroundColor = "green";
                    progreso.style.width = porcentajeRestar + "%";
                }
            } else {
                if (elemento.value.length >= maximoCaracteres) {
                    return false;
                } else {
                    if(parseInt(progreso.style.width.replace('%','')) != 100){
                        progreso.style.width = porcentajeSumar + "%";
                    }
                    return true;
                }
            }
        }
    </script>
    <textarea id="texto" onkeydown="return limitar(5, event);"></textarea>
    <div style="width: 500px; border: 1px solid black;">
            <div id="progreso" style="width: 0%; height: 20px; background-color: green;"></div>
    </div>
</body>
</html>
