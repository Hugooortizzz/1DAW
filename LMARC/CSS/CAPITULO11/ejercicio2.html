<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="ejercicio2.css">

</head>

<body>
    <!-- Apartados 3 y 4 -->
    <h1>Formulario de alta</h1>
    <form>
        <table>
            <tr>
                <td><h2>Nombre y apellidos<h3>*</h3></h2><br></td>
                <td>
                    
                    <input type="text" name="nombre"><br>
                    <label for="nombre">Nombre</label>
                    <div class="ayuda">Debemos saber quien eres</div>
                    <input type="text" name="primer_apellido" size="35"><br>
                    <label for="primer_apellido">Primer apellido</label>
                    <input type="text" name="segundo_apellido" size="35"><br>
                    <label for="segundo_apellido">Segundo apellido</label>
                    
                </td>
            </tr>
            <tr>
                <td><h2>Dirección<h3>*</h3></h2><br></td>
                <td>
                    
                    <input type="text" name="direccion" size="46"><br>
                    <label for="direccion">Calle, numero, piso, puerta</label>
                    <div class="ayuda">El código postal es imprescindible para poder recibir los pedidos</div>

                    <table>
                        <tr>
                            <td><input type="number" name="codigo_postal"></td>
                            <td><input type="text" name="municipio"></td>
                        </tr>
                        <tr>
                            <td><label for="codigo_postal">Código postal</label></td>
                            <td><label for="municipio">Municipio</label></td>
                        </tr>
                        <tr>
                            <td><select>
                                    <option value="" selected disabled hidden></option>
                                    <option>Sevilla</option>
                                    <option>Huelva</option>
                                    <option>Cádiz</option>
                                    <option>Málaga</option>
                                    <option>Almería</option>
                                    <option>Granada</option>
                                    <option>Jaén</option>
                                </select></td>
                            <td><select>
                                    <option value="" selected disabled hidden></option>
                                    <option>España</option>
                                    <option>Marruecos</option>
                                    <option>Portugal</option>
                                    <option>Francia</option>
                                    <option>Japón</option>
                                    <option>USA</option>
                                    <option>UK</option>
                                </select></td>
                        </tr>
                        <tr>
                            <td><label for="provincia">Provincia</label></td>
                            <td><label for="pais">País</label></td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr>
                <td><h2>Email</h2><br></td>
                <td>
                    <input type="email" name="email" size="46">
                    <div class="ayuda" id="email">Para poder enviarte correos</div>
                </td>
            </tr>
            <tr>
                <td><h2>Teléfono <h3>*</h3></h2></td>
                <td>
                    
                    
                    <table>
                        <tr>
                            <td><input type="number" name="fijo"></td>
                            <td><input type="number" name="movil"></td>
                        </tr>
                        <tr>
                            <td><label for="fijo">Fijo</label></td>
                            <td><label for="movil">Móvil</label></td>
                        </tr>
                    </table>
                    <div class="ayuda">Para poder llamarte</div>
                </td>
            </tr>
        </table>
        <hr>
        <input type="submit" id="submit" value="Darme de alta --->">
    </form>
</body>

</html>
